spring:
  application:
    name: MiraAgent
  servlet:
    multipart:
      max-file-size: 25MB        # 文档上传上限
      max-request-size: 25MB
  datasource:
    url: ${MIRA_DB_URL}
    username: ${MIRA_DB_USERNAME}
    password: ${MIRA_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

mira:
  model:
    base-url: ${MIRA_MODEL_BASE_URL:https://api.xiaomimimo.com/v1}
    api-key: ${MIRA_MODEL_API_KEY}
    name: ${MIRA_MODEL_NAME:mimov2.5flash}
    temperature: ${MIRA_MODEL_TEMPERATURE:0.7}
    max-tokens: ${MIRA_MODEL_MAX_TOKENS:8192}

  # MCP 接入（默认关闭）。enabled=true 后，启动时连接各 server 并把工具桥接进统一 ToolRegistry，
  # 复用同一套权限/trace/artifact 管理。示例自带 server：scripts/mcp/echo_mcp_server.py。
  # mcp:
  #   enabled: true
  #   servers:
  #     - id: demo
  #       type: stdio
  #       command: python3
  #       args: [ "scripts/mcp/echo_mcp_server.py" ]
  #       tool-risk-level: low
  #       request-timeout-millis: 30000   # 读响应超时,防 server 卡死阻塞;失败会自动重连重握手
  #     # 官方 server 示例（需联网拉取）：
  #     - id: filesystem
  #       type: stdio
  #       command: npx
  #       args: [ "-y", "@modelcontextprotocol/server-filesystem", "/tmp" ]
  #       tool-risk-level: medium
  #     # HTTP server 示例：
  #     - id: remote
  #       type: http
  #       url: http://localhost:9000/mcp
  #     # 联网搜索（Exa 远程 MCP，移植自 opencode 的 websearch 方案）：
  #     # 启用后桥接出 mcp__exa__web_search_exa / web_fetch_exa 等工具，复用统一权限/trace/artifact。
  #     # 该端点免费免 key 即可使用；若有 https://exa.ai 的 key 可加 headers.x-api-key 提额度。
  #     - id: exa
  #       type: http
  #       url: https://mcp.exa.ai/mcp
  #       tool-risk-level: low

  # 内置工具：calculator(LOW)/web_fetch(MEDIUM)/file_read(MEDIUM)/file_write(HIGH) + note/todo
  # + 文档处理 document_list(LOW)/document_read(MEDIUM,Tika 全格式解析)/document_write(MEDIUM,POI 生成 docx/xlsx)。
  # max-risk-level 控制放行阈值：默认 medium，危险写入工具 file_write(HIGH) 被门控；
  # 抬到 high 才放行（危险工具的显式确认流程）。
  # file.base-dir 为文件/文档工具共用的沙箱根目录，也是 /api/documents 上传落盘处。
  tools:
    max-risk-level: ${MIRA_TOOLS_MAX_RISK:medium}
    file:
      base-dir: ${MIRA_TOOLS_FILE_DIR:${user.home}/.miraagent/files}

  # 角色卡：内置示例卡随 classpath(resources/characters/*.json) 加载；
  # 用户导入的卡存到 base-dir（同 id 覆盖内置）。
  character:
    base-dir: ${MIRA_CHARACTER_DIR:${user.home}/.miraagent/characters}

logging:
  level:
    com.felix.miraagent: DEBUG
